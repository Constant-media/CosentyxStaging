<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner Ad - 1080x1920</title>
    <style>
        /* Reset margins and sizing */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #f0f0f0;
            /* Center the ad if viewing on desktop */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        .ad-container {
            /* Full width up to 1080px */
            width: 100%;
            max-width: 1080px;
            
            /* Maintain vertical aspect ratio 1080x1920 */
            aspect-ratio: 1080 / 1920;
            
            /* Prevent the ad from growing taller than the screen */
            max-height: 100vh;
            
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .hero-image {
            width: 100%;
            height: auto;
            display: block;
            /* Prevent the hero image from shrinking */
            flex-shrink: 0;
        }

        .isi-container {
            /* Take up the remaining vertical space under the hero image */
            flex-grow: 1;
            width: 100%;
            
            /* Enable vertical scrolling for the long content */
            overflow-y: auto;
            overflow-x: hidden;
            
            /* Smooth momentum scrolling on mobile devices */
            -webkit-overflow-scrolling: touch;
        }

        .isi-image {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Custom scrollbar to make it look clean */
        .isi-container::-webkit-scrollbar {
            width: 10px;
        }
        .isi-container::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .isi-container::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 5px;
        }
        .isi-container::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>
<body>
    <div class="ad-container">
        <!-- Top anchored Hero Image -->
        <img src="hero.jpg" class="hero-image" alt="Hero Ad Image">
        
        <!-- Bottom scrollable ISI container -->
        <div class="isi-container">
            <img src="ISI.jpg" class="isi-image" alt="Important Safety Information (ISI)">
        </div>
    </div>
</body>
</html>
